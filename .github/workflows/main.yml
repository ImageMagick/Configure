on:
  push:
    branches:
    - main

name: Main
permissions:
  contents: read
jobs:
  build:
    name: Build (${{matrix.architecture}}, ${{matrix.configuration}})
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        architecture: [ x86, x64, arm64 ]
        configuration: [ Debug, Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Build configure
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\Common7\Tools\VsDevCmd.bat"
          msbuild Configure.sln /m /t:Rebuild /p:Configuration=${{matrix.configuration}},Platform=${{matrix.architecture}}
